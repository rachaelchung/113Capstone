<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function () {
      try {
        if (!/\.github\.io$/i.test(window.location.hostname)) return;
        var parts = window.location.pathname.split('/').filter(Boolean);
        if (!parts.length) return;
        var seg = parts[0];
        if (!seg || /\.html?$/i.test(seg)) return;
        var b = document.createElement('base');
        b.href = '/' + seg + '/';
        document.head.prepend(b);
      } catch (e) {
        /* no-op */
      }
    })();
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#2a2630" />
  <!-- Optional override; production default is js/apiBaseConfig.js (HENN_REMOTE_API_BASE). Local dev: probed automatically on http localhost. -->
  <meta name="tracker-api-base" content="" />
  <title>head empty. no thoughts.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/tracker.css" />
</head>
<body>
  <script>
    (function () {
      var h = window.location.hash || '';
      if (h.indexOf('tracker_auth=') === -1) return;
      var m = /tracker_auth=([^&]+)/.exec(h);
      if (!m || !m[1]) return;
      var raw = m[1];
      try {
        localStorage.setItem('henn_tracker_jwt', decodeURIComponent(raw));
      } catch (e) {
        localStorage.setItem('henn_tracker_jwt', raw);
      }
      try {
        var body = raw.split('.')[1];
        if (body) {
          var b64 = body.replace(/-/g, '+').replace(/_/g, '/');
          while (b64.length % 4) b64 += '=';
          var payload = JSON.parse(atob(b64));
          if (payload && payload.sub != null) {
            localStorage.setItem('henn_tracker_user_id', String(payload.sub));
          }
        }
      } catch (e2) { /* ignore */ }
      window.location.replace(window.location.pathname + window.location.search);
    })();
  </script>

  <div class="app" id="app">

    <header class="app-top">
      <div class="app-top__tray" role="toolbar" aria-label="App menu and navigation">
        <button type="button" class="icon-btn icon-btn--menu" id="menuBtn"
          aria-label="Open menu" aria-expanded="false" aria-controls="sideMenu">
          <span class="icon-btn__hamburger" aria-hidden="true">
            <span></span><span></span><span></span>
          </span>
        </button>
        <button type="button" class="icon-btn icon-btn--screen" id="screenToggleBtn"
          data-target-screen="focus" aria-label="Go to focus timer">
          <svg class="icon-btn__svg icon-btn__svg--hidden" id="navIconHome" width="22" height="22" viewBox="0 0 24 24" aria-hidden="true">
            <path fill="currentColor" d="M4 10.5 12 3l8 7.5V20a1 1 0 0 1-1 1h-5v-6H10v6H5a1 1 0 0 1-1-1v-9.5Z"/>
          </svg>
          <svg class="icon-btn__svg" id="navIconFocus" width="22" height="22" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path fill="currentColor" d="M12 7v5.2L15 15l1.2-.7-3.2-2V7H12z"/>
          </svg>
        </button>
        <button type="button" class="icon-btn icon-btn--store" id="storeBtn" aria-label="Open habitat shop" title="habitat shop">
          <svg class="icon-btn__svg" width="22" height="22" viewBox="0 0 24 24" aria-hidden="true">
            <path fill="currentColor" d="M4 7a2 2 0 0 1 2-2h2l1-2h6l1 2h2a2 2 0 0 1 2 2v1H4V7Zm0 3h16v10a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V10Zm4 3v2h8v-2H8Z"/>
          </svg>
        </button>
      </div>
      <div class="app-top__brand">
        <span class="app-top__title">head empty</span>
        <span class="app-top__dot" aria-hidden="true"></span>
        <span class="app-top__subtitle">no thoughts</span>
      </div>
    </header>

    <div id="sideMenu" class="side-menu" hidden>
      <div class="side-menu__backdrop" id="sideMenuBackdrop" tabindex="-1" aria-hidden="true"></div>
      <div class="side-menu__panel" role="dialog" aria-modal="true" aria-labelledby="sideMenuTitle">
        <h2 class="side-menu__title" id="sideMenuTitle">menu</h2>
        <p class="side-menu__hint">your habitat, focus timer, and assignment tracker.</p>
        <div class="side-menu__scroll">
          <nav class="side-menu__nav" aria-label="screens">
            <p class="side-menu__section-label">home</p>
            <button type="button" class="side-menu__nav-btn" data-app-screen="home">habitat</button>
            <button type="button" class="side-menu__nav-btn" data-app-screen="focus">focus timer</button>
            <p class="side-menu__section-label">assignments</p>
            <button type="button" class="side-menu__nav-btn tracker-tab" data-tracker-tab="courses">courses</button>
            <button type="button" class="side-menu__nav-btn tracker-tab" data-tracker-tab="weekly">weekly</button>
            <button type="button" class="side-menu__nav-btn tracker-tab" data-tracker-tab="todo">to-do</button>
            <button type="button" class="side-menu__nav-btn tracker-tab" data-tracker-tab="calendar">calendar</button>
          </nav>
        </div>
        <div class="side-menu__footer">
          <p class="side-menu__section-label">account</p>
          <button type="button" class="side-menu__nav-btn" id="sideMenuProfileBtn">profile</button>
          <button type="button" class="side-menu__nav-btn side-menu__nav-btn--danger" id="sideMenuLogoutBtn">log out</button>
        </div>
      </div>
    </div>

    <!-- floats above screens; hidden on home (timer paused there) -->
    <aside id="timerDock" class="timer-dock" aria-label="Pomodoro timer">
      <div class="timer-dock__shell" id="timerDockShell">
        <div class="timer-dock__handle" id="timerDockHandle" role="group" aria-label="Timer title bar" tabindex="0"
          data-drag-hint="Drag to move timer" title="drag the grip to move">
          <span class="timer-dock__handle-spacer" aria-hidden="true"></span>
          <span class="timer-dock__grip" aria-hidden="true" id="timerDockGrip" title="drag to move">
            <span></span><span></span><span></span>
          </span>
          <button type="button" class="timer-dock__pin-btn" id="timerDockMinBtn"
            aria-pressed="false" aria-label="Minimize timer to a side tab" title="minimize to side tab">⟩</button>
        </div>
        <div class="timer-dock__inner">
          <div class="timer-row timer-row--float">
            <div class="timer-ring-wrap timer-ring-wrap--float">
              <svg class="timer-svg" viewBox="0 0 120 120" aria-hidden="true">
                <circle class="ring-track" cx="60" cy="60" r="50"/>
                <circle class="ring-progress" id="progressRing" cx="60" cy="60" r="50"
                  stroke-dasharray="314" stroke-dashoffset="0"
                  transform="rotate(-90 60 60)"/>
              </svg>
              <div class="timer-display">
                <div class="timer-time" id="timerDisplay">25:00</div>
                <div class="phase-badge" id="phaseBadge">focus</div>
              </div>
            </div>
            <div class="timer-side timer-side--float">
              <div class="sessions" id="sessions">
                <div class="session-dot active" id="sd0"></div>
                <div class="session-dot" id="sd1"></div>
                <div class="session-dot" id="sd2"></div>
                <div class="session-dot" id="sd3"></div>
              </div>
              <div class="btn-group btn-group--float">
                <button class="btn btn--start" id="startBtn">start</button>
                <button class="btn btn--reset" id="resetBtn">reset</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </aside>

    <!-- focus: timer + catch lane -->
    <section id="screen-focus" class="screen" aria-label="Focus timer">
      <div class="habitat habitat--focus" id="focusArena" data-focus-bg="default">
        <div id="focusBgLayer" class="focus-bg focus-bg--default" aria-hidden="true"></div>
        <div class="sky"></div>
        <div class="ground"></div>
        <div class="ground-stripe"></div>

        <div class="tree" style="left:6%">
          <div class="tree-leaves"></div>
          <div class="tree-trunk"></div>
        </div>
        <div class="tree" style="right:9%">
          <div class="tree-leaves tree-leaves--small"></div>
          <div class="tree-trunk tree-trunk--short"></div>
        </div>

        <div class="cloud" style="width:62px;height:20px;top:18px;left:12%"></div>
        <div class="cloud" style="width:44px;height:15px;top:34px;left:30%"></div>
        <div class="cloud" style="width:72px;height:22px;top:12px;left:60%"></div>

        <div class="notif" id="notif"></div>
      </div>

      <div class="controls">
        <div class="stats-row">
          <div class="stat">
            <div class="stat-val" id="foodStat">0</div>
            <div class="stat-label">food</div>
          </div>
          <div class="stat">
            <div class="stat-val" id="coinsStat">0</div>
            <div class="stat-label">coins</div>
          </div>
          <div class="stat">
            <div class="stat-val" id="caughtStat">0</div>
            <div class="stat-label">caught</div>
          </div>
        </div>
      </div>
    </section>

    <!-- assignment tracker (tabs live in side menu) -->
    <section id="screen-tracker" class="screen screen--tracker" aria-label="Assignment tracker">
      <main class="tracker-main tracker-main--embed">
        <section id="trackerWeekly" data-tracker-panel="weekly" class="tracker-panel"></section>
        <section id="trackerCalendar" data-tracker-panel="calendar" class="tracker-panel" hidden></section>
        <section id="trackerTodo" data-tracker-panel="todo" class="tracker-panel" hidden></section>
        <section id="trackerCourses" data-tracker-panel="courses" class="tracker-panel" hidden></section>
      </main>
    </section>

    <!-- home: wander + decorate (backgrounds & furniture hooks) -->
    <section id="screen-home" class="screen screen--active" aria-label="Your habitat">
      <div class="home-shell">
        <div class="home-habitat" id="homeHabitat">
          <div id="homeBgLayer" class="home-bg home-bg--default" aria-hidden="true"></div>
          <div class="home-sky"></div>
          <div class="home-sun" aria-hidden="true"></div>
          <div class="home-ground"></div>
          <div class="home-ground-stripe"></div>

          <div class="home-tree" style="left:7%">
            <div class="tree-leaves"></div>
            <div class="tree-trunk"></div>
          </div>
          <div class="home-tree" style="right:8%">
            <div class="tree-leaves tree-leaves--small"></div>
            <div class="tree-trunk tree-trunk--short"></div>
          </div>

          <div class="home-cloud" style="width:70px;height:22px;top:14%;left:10%"></div>
          <div class="home-cloud" style="width:52px;height:18px;top:22%;left:42%"></div>
          <div class="home-cloud" style="width:88px;height:26px;top:12%;left:68%"></div>

          <div id="furnitureSlotLayer" class="furniture-slot-layer"></div>

          <div id="residentLayer" class="resident-layer"></div>
        </div>
      </div>
    </section>

    <div id="profileOverlay" class="store-overlay" hidden>
      <div class="store-overlay__backdrop" id="profileBackdrop" tabindex="-1" aria-hidden="true"></div>
      <div class="store-card profile-card" role="dialog" aria-modal="true" aria-labelledby="profileTitle">
        <button type="button" class="store-close" id="profileCloseBtn" aria-label="Close profile">×</button>
        <h2 class="store-title" id="profileTitle">profile</h2>
        <p class="profile-lede" id="profileLede">loading…</p>
        <dl class="profile-dl" id="profileDl" hidden></dl>
        <p class="profile-hint" id="profileHint" hidden></p>
        <button type="button" class="btn btn--reset profile-logout" id="profileOverlayLogoutBtn">log out</button>
      </div>
    </div>

    <div id="storeOverlay" class="store-overlay" hidden>
      <div class="store-overlay__backdrop" id="storeBackdrop" tabindex="-1" aria-hidden="true"></div>
      <div class="store-card" role="dialog" aria-modal="true" aria-labelledby="storeTitle">
        <button type="button" class="store-close" id="storeCloseBtn" aria-label="Close shop">×</button>
        <h2 class="store-title" id="storeTitle">habitat shop</h2>
        <div class="store-tabs" role="tablist" aria-label="Shop categories">

            aria-selected="true" aria-controls="storeList" data-store-tab="decor">decor</button>
          <button type="button" class="store-tab" role="tab" id="storeTabHomeBg"
            aria-selected="false" aria-controls="storeList" data-store-tab="homeBg">home bg</button>
          <button type="button" class="store-tab" role="tab" id="storeTabFocusBg"
            aria-selected="false" aria-controls="storeList" data-store-tab="focusBg">focus bg</button>
        </div>
        <p class="store-lede" id="storeLede">placeable props — each buy adds one to your inventory.</p>
        <div id="storeList" class="store-list" role="tabpanel" aria-labelledby="storeTabDecor"></div>
      </div>
    </div>

    <div id="decorPickOverlay" class="decor-pick-overlay" hidden>
      <div class="decor-pick-overlay__backdrop" id="decorPickBackdrop" tabindex="-1" aria-hidden="true"></div>
      <div class="decor-pick-card" role="dialog" aria-modal="true" aria-labelledby="decorPickTitle">
        <h2 class="decor-pick-title" id="decorPickTitle">place decoration</h2>
        <p class="decor-pick-sub" id="decorPickSub"></p>
        <div id="decorPickList" class="decor-pick-list"></div>
        <button type="button" class="btn btn--decor-pick-cancel" id="decorPickCancel">cancel</button>
      </div>
    </div>

    <!-- naming flow for new catches -->
    <div id="welcomeOverlay" class="welcome-overlay" hidden>
      <div class="welcome-card" role="dialog" aria-modal="true" aria-labelledby="welcomeTitle">
        <h2 class="welcome-title" id="welcomeTitle">someone new arrived!</h2>
        <p class="welcome-sub" id="welcomeSub"></p>
        <div class="welcome-creature" id="welcomeCreature"></div>
        <label class="welcome-label" for="welcomeNameInput">call them…</label>
        <input type="text" id="welcomeNameInput" class="welcome-input" maxlength="28" autocomplete="off" />
        <div class="welcome-actions">
          <button type="button" class="btn btn--welcome-primary" id="welcomeBtnName">welcome in</button>
          <button type="button" class="btn btn--welcome-secondary" id="welcomeBtnSkip">use default name</button>
        </div>
      </div>
    </div>
  </div>

  <div id="courseDetailModalHost" class="tracker-modal-host" hidden></div>
  <div id="addCourseModalHost" class="tracker-modal-host" hidden></div>

  <script src="js/game.js"></script>

  <script src="js/trackerStore.js"></script>
  <script src="js/apiBaseConfig.js"></script>
  <script src="js/apiResolve.js"></script>
  <script src="js/trackerApi.js"></script>
  <script src="js/userAppState.js"></script>
  <script src="js/trackerMain.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
